        "formula": [ 1, 2, 1, 2, 2, 2, 2 ],
        "degree_quality": [ "i", "ii", "iii", "IV", "V", "VI", "VII" ],
        "chord_progression": [ "m7(♭5)", "m(maj7)", "m7", "maj7(♯5)", "7", "7", "m7(♭5)" ],
        "chord_progression_short": [ "∅", "-Δ", "-7", "+Δ", "7", "7", "∅" ]
      }
    ];
    const NOTES_SHARP = [ "C", "C♯", "D", "D♯", "E", "F", "F♯", "G", "G♯", "A", "A♯", "B" ];
    const NOTES_FLAT = [ "C", "D♭", "D", "E♭", "E", "F", "G♭", "G", "A♭", "A", "B♭", "B" ];
    const ROMAN_NUMBER = [ "I", "II", "III", "IV", "V", "VI", "VII" ];
    const NOTE_LETTERS = [ "C", "D", "E", "F", "G", "A", "B" ];
    const NATURAL_SEMITONES = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
    const CHEATSHEET_IDS = [ "intervals", "scale_degrees", "formula", "degree_quality", "progression" ];
    const ACCIDENTALS_REGEX = /[♯♭𝄪𝄫]/gu;

    let NOTES = NOTES_SHARP;
    let ROOT_SINGLE_SCALE = 0;
    let SCALE = 0;
    let ROOT_MULTI_SCALE = 0;
    let CHORD_QUALITY = 0;
    let SHOW_SCALE = 0;
    let SWITCH_FLAT = false;
    let CHORD_NOTATION_SHORT = false;
    
    document.addEventListener('DOMContentLoaded', () => {
      
      createRootSelect();
      
      document.getElementById('scale_root').addEventListener("change", (e) => {
        ROOT_SINGLE_SCALE = e.target.value;
        document.getElementById('scale_mode').selectedIndex = 0;
      });
      document.getElementById('scale_mode').addEventListener("change", (e) => {
        SCALE = e.target.value;
        showScale();
      });
      document.getElementById('cheatsheet_root').addEventListener("change", (e) => {
        ROOT_MULTI_SCALE = e.target.value;
        document.getElementById('cheatsheet_item').selectedIndex = 0;
      });
      document.getElementById('cheatsheet_quality').addEventListener("change", (e) => {
        CHORD_QUALITY = e.target.value;
        document.getElementById('cheatsheet_item').selectedIndex = 0;
      });
      document.getElementById('cheatsheet_item').addEventListener("change", (e) => {
        SHOW_SCALE = e.target.value;
        showMultiScale();
      });
      document.getElementById('switchFlat').addEventListener("change", (e) => {
        SWITCH_FLAT = e.target.checked;
        toggleFlat();
      });
      document.getElementById('switchShorthand').addEventListener("change", (e) => {
        CHORD_NOTATION_SHORT = e.target.checked;
        showScale();
        showMultiScale();
      });
      
    });
    
    function createRootSelect() {
      const select = document.getElementById('scale_root');
      const selectMulti = document.getElementById('cheatsheet_root');
      select.innerHTML = '';
      selectMulti.innerHTML = '';
      const template = document.getElementById('root_empty_option');
      const emptyOption = template.content.firstElementChild.cloneNode(true);
      const emptyOptionMulti = template.content.firstElementChild.cloneNode(true);
      select.appendChild(emptyOption);
      selectMulti.appendChild(emptyOptionMulti);
      NOTES.forEach((item, index) => {
        const o = document.createElement('option');
        o.value = (index+1);
        o.textContent = item;
        select.appendChild(o);
        const oMulti = document.createElement('option');
        oMulti.value = (index+1);
        oMulti.textContent = item;
        selectMulti.appendChild(oMulti);
      });
      if (ROOT_SINGLE_SCALE > 0) {
        select.value = ROOT_SINGLE_SCALE;
        showScale();
      }
      if (ROOT_MULTI_SCALE > 0) {
        selectMulti.value = ROOT_MULTI_SCALE;
        showMultiScale();
      }
    }

    function toggleFlat() {
      NOTES = SWITCH_FLAT ? NOTES_FLAT : NOTES_SHARP;
      createRootSelect();
    }

    function showScale() {
      if (SCALE == 0) { return; }
      if (ROOT_SINGLE_SCALE == 0) { return; }
      document.getElementById('single_content').style.display = 'block';
      document.getElementById('single_welcome').style.display = 'none';
      const mode = MODES[(SCALE-1)];
      const res = generateScale(NOTES[(ROOT_SINGLE_SCALE-1)], mode.formula);
      const template = document.getElementById('scale_tmpl');
      const fragmentDegrees = new DocumentFragment();
      const fragmentChords = new DocumentFragment();
      for (let i = 0; i < 7; i++) {
        const colScale = template.content.firstElementChild.cloneNode(true);
        colScale.getElementsByClassName('card-header')[0].textContent = mode.intervals[i];
        colScale.getElementsByTagName('p')[0].innerHTML = wrapAccidentalsInSup(res[i]);
        fragmentDegrees.appendChild(colScale);
        const colChord = template.content.firstElementChild.cloneNode(true);
        colChord.getElementsByClassName('card-header')[0].textContent = mode.degree_quality[i];
        if (CHORD_NOTATION_SHORT) {
          colChord.getElementsByTagName('p')[0].innerHTML = wrapAccidentalsInSup(res[i])+mode.chord_progression_short[i];
        } else {
          colChord.getElementsByTagName('p')[0].innerHTML = wrapAccidentalsInSup(res[i])+mode.chord_progression[i];
        }
        fragmentChords.appendChild(colChord);
      }
      const el = document.getElementById('scale_degrees_content');
      el.innerHTML = "";
      el.appendChild(fragmentDegrees);
      const el2 = document.getElementById('scale_chords_content');
      el2.innerHTML = "";
      el2.appendChild(fragmentChords);
    }

    function showMultiScale() {
      if (SHOW_SCALE == 0) { return; }
      if (ROOT_MULTI_SCALE == 0) { return; }
      document.getElementById('multiple_content').style.display = 'block';
      document.getElementById('multiple_welcome').style.display = 'none';
      const cmd = CHEATSHEET_IDS[(SHOW_SCALE-1)];
      const template = document.getElementById('cheatsheet_tmpl');
      const fragment = new DocumentFragment();
      for (let i = 0; i < 21; i++) {
        let item = MODES[i];
        if (CHORD_QUALITY == 2 && !item.maj) { continue; }
        if (CHORD_QUALITY == 3 && item.maj) { continue; }
        item.scale_degrees = generateScale(NOTES[(ROOT_MULTI_SCALE-1)], item.formula);
        const tr = template.content.firstElementChild.cloneNode(true);
        tr.children[0].textContent = item.name;
        if (SHOW_SCALE == 5) {
          if (CHORD_NOTATION_SHORT) {
            for (let l = 0; l < NOTE_LETTERS.length; l++) {
              tr.children[l+1].innerHTML = item.scale_degrees[l]+item.chord_progression_short[l];
            }
          } else {
            for (let m = 0; m < NOTE_LETTERS.length; m++) {
              tr.children[m+1].textContent = item.scale_degrees[m]+item.chord_progression[m];
            }
          }
        } else {
          for (let n = 0; n < NOTE_LETTERS.length; n++) {
            tr.children[n+1].textContent = item[cmd][n];
          }
        }
        fragment.appendChild(tr);
      }
      const el = document.getElementById('cheatsheet_content');
      el.innerHTML = "";
      el.appendChild(fragment);
    }

    function wrapAccidentalsInSup(text) {
      return text.replace(ACCIDENTALS_REGEX, (char) => `<sup>${char}</sup>`);
    }


    // Parse note like: C, C#, C♯, Db, D♭, D♭♭, F##, F♯♯, G𝄪, Abb, A𝄫
    function parseNote(note) {
      note = note.replace(/#/g, "♯").replace(/b/g, "♭");
      const letter = note[0];
      const accidentals = note.slice(1);
      let accidentalValue = 0;
      for (const char of accidentals) {
        if (char === "♯") { accidentalValue += 1 };
        if (char === "♭") { accidentalValue -= 1 };
        if (char === "𝄪") { accidentalValue += 2 };
        if (char === "𝄫") { accidentalValue -= 2 };
      }
      const semitone = (NATURAL_SEMITONES[letter] + accidentalValue + 12) % 12;
      return { letter, semitone };
    }
    // Replace accidentals
    function accidentalString(offset) {
      if (offset === 0) { return "" };
      if (offset > 0) {
        if (offset === 2) { return "𝄪" };
        return "♯".repeat(offset);
      }
      if (offset < 0) {
        if (offset === -2) { return "𝄫" };
        return "♭".repeat(Math.abs(offset));
      }
    }

    // Generate scale from root note and interval formula in semitones
    function generateScale(root, formula) {
      const parsedRoot = parseNote(root);
      const scale = [root];
      let currentSemitone = parsedRoot.semitone;
      let currentLetterIndex = NOTE_LETTERS.indexOf(parsedRoot.letter);
      for (let i = 0; i < formula.length - 1; i++) {
        currentSemitone = (currentSemitone + formula[i]) % 12;
        currentLetterIndex = (currentLetterIndex + 1) % 7;
        const targetLetter = NOTE_LETTERS[currentLetterIndex];
        const naturalSemitone = NATURAL_SEMITONES[targetLetter];
        let diff = (currentSemitone - naturalSemitone + 12) % 12;
        // normalize to range [-6, +6]
        if (diff > 6) { diff -= 12 };
        const note = targetLetter + accidentalString(diff);
        scale.push(note);
      }
      return scale;
    }

  </script>
</body>
